server {
  listen 80;
  index index.html;

  location / {
    root /frontend;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }

  location /static/ {
    alias /app/collected_static/;
  }

  location /media/ {
    alias /app/media/;
  }
}